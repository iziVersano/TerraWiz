  <text x="106" y="275" text-anchor="middle" dominant-baseline="central" fill="rgb(130,90,0)" font-size="11">EBS gp3 · 8GB</text>
  <rect x="64" y="288" width="178" height="18" rx="4" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="153" y="297" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-size="12">SG · from ELB only</text>
  <line x1="153" y1="316" x2="153" y2="340" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5" fill="none"/>

  <!-- WEB TIER 1B -->
  <rect x="326" y="198" width="202" height="130" rx="10" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="346" y="216" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Web · 10.0.2.0/24</text>
  <rect x="480" y="204" width="40" height="18" rx="4" fill="rgb(252,235,235)" stroke="rgb(163,45,45)" stroke-width="0.5"/>
  <text x="500" y="213" text-anchor="middle" dominant-baseline="central" fill="rgb(163,45,45)" font-size="12">NACL</text>
  <rect x="338" y="226" width="178" height="34" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="427" y="239" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="14" font-weight="500">EC2 · auto scaling</text>
  <text x="427" y="253" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="12">web server</text>
