  <text x="380" y="275" text-anchor="middle" dominant-baseline="central" fill="rgb(130,90,0)" font-size="11">EBS gp3 · 8GB</text>
  <rect x="338" y="288" width="178" height="18" rx="4" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="427" y="297" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-size="12">SG · from ELB only</text>
  <line x1="427" y1="316" x2="427" y2="340" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5" fill="none"/>

  <!-- APP TIER 1A -->
  <rect x="52" y="340" width="202" height="130" rx="10" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="72" y="358" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500">App · 10.0.3.0/24</text>
  <rect x="206" y="346" width="40" height="18" rx="4" fill="rgb(252,235,235)" stroke="rgb(163,45,45)" stroke-width="0.5"/>
  <text x="226" y="355" text-anchor="middle" dominant-baseline="central" fill="rgb(163,45,45)" font-size="12">NACL</text>
  <rect x="64" y="368" width="178" height="34" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="153" y="381" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="14" font-weight="500">EC2 · auto scaling</text>
  <text x="153" y="395" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="12">app server</text>
  <!-- EBS badge on app EC2 AZ1A -->
  <rect x="64" y="408" width="84" height="18" rx="4" fill="rgb(255,245,210)" stroke="rgb(180,130,0)" stroke-width="0.5"/>
  <text x="106" y="417" text-anchor="middle" dominant-baseline="central" fill="rgb(130,90,0)" font-size="11">EBS gp3 · 8GB</text>
  <rect x="64" y="430" width="178" height="18" rx="4" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="153" y="439" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-size="12">SG · from web tier SG</text>
  <line x1="153" y1="458" x2="153" y2="480" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5" fill="none"/>

  <!-- APP TIER 1B -->
  <rect x="326" y="340" width="202" height="130" rx="10" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="346" y="358" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500">App · 10.0.4.0/24</text>
  <rect x="480" y="346" width="40" height="18" rx="4" fill="rgb(252,235,235)" stroke="rgb(163,45,45)" stroke-width="0.5"/>
  <text x="500" y="355" text-anchor="middle" dominant-baseline="central" fill="rgb(163,45,45)" font-size="12">NACL</text>
  <rect x="338" y="368" width="178" height="34" rx="8" fill="rgb(250,236,231)" stroke="rgb(153,60,29)" stroke-width="0.5"/>
  <text x="427" y="381" text-anchor="middle" dominant-baseline="central" fill="rgb(113,43,19)" font-size="14" font-weight="500">EC2 · auto scaling</text>
  <text x="427" y="395" text-anchor="middle" dominant-baseline="central" fill="rgb(153,60,29)" font-size="12">app server</text>
  <!-- EBS badge on app EC2 AZ1B -->
  <rect x="338" y="408" width="84" height="18" rx="4" fill="rgb(255,245,210)" stroke="rgb(180,130,0)" stroke-width="0.5"/>
  <text x="380" y="417" text-anchor="middle" dominant-baseline="central" fill="rgb(130,90,0)" font-size="11">EBS gp3 · 8GB</text>
  <rect x="338" y="430" width="178" height="18" rx="4" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="427" y="439" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-size="12">SG · from web tier SG</text>
  <line x1="427" y1="458" x2="427" y2="480" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5" fill="none"/>

  <!-- DB TIER -->
  <rect x="52" y="480" width="476" height="110" rx="10" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
  <text x="72" y="498" dominant-baseline="central" fill="rgb(68,68,65)" font-size="14" font-weight="500">DB tier · 10.0.5.0/24 · spans both AZs</text>
  <rect x="90" y="512" width="140" height="34" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
  <text x="160" y="525" text-anchor="middle" dominant-baseline="central" fill="rgb(68,68,65)" font-size="14" font-weight="500">RDS primary</text>
  <text x="160" y="539" text-anchor="middle" dominant-baseline="central" fill="rgb(95,94,90)" font-size="12">AZ 1A</text>
  <rect x="350" y="512" width="140" height="34" rx="8" fill="rgb(241,239,232)" stroke="rgb(95,94,90)" stroke-width="0.5"/>
  <text x="420" y="525" text-anchor="middle" dominant-baseline="central" fill="rgb(68,68,65)" font-size="14" font-weight="500">RDS replica</text>
  <text x="420" y="539" text-anchor="middle" dominant-baseline="central" fill="rgb(95,94,90)" font-size="12">AZ 1B</text>
  <line x1="230" y1="529" x2="348" y2="529" stroke-dasharray="4 3" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5" fill="none"/>
  <text x="290" y="522" text-anchor="middle" fill="rgb(61,61,58)" font-size="12">replication</text>
  <rect x="90" y="554" width="400" height="20" rx="4" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="290" y="564" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-size="12">SG · allow 3306 from app tier SG only</text>

  <!-- SNAPSHOT + LIFECYCLE POLICY (new — from 2026-06-02 lesson) -->
  <rect x="52" y="606" width="476" height="50" rx="8" fill="rgb(255,248,220)" stroke="rgb(180,130,0)" stroke-width="0.5"/>
  <text x="290" y="622" text-anchor="middle" dominant-baseline="central" fill="rgb(130,90,0)" font-size="14" font-weight="500">EBS Snapshots · Lifecycle Policy (DLM)</text>
  <text x="290" y="640" text-anchor="middle" dominant-baseline="central" fill="rgb(160,110,0)" font-size="12">daily backup of all EBS volumes · keep 7 · stored in S3 · Golden AMI</text>
  <!-- Arrow from EBS volumes down to snapshot row -->
  <line x1="153" y1="590" x2="200" y2="606" marker-end="url(#arrow)" stroke="rgb(180,130,0)" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
  <line x1="427" y1="590" x2="380" y2="606" marker-end="url(#arrow)" stroke="rgb(180,130,0)" stroke-width="1" stroke-dasharray="3 2" fill="none"/>

  <!-- VPC Endpoint -->
  <rect x="52" y="672" width="476" height="44" rx="8" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
  <text x="290" y="688" text-anchor="middle" dominant-baseline="central" fill="rgb(39,80,10)" font-size="14" font-weight="500">VPC Gateway Endpoint</text>
  <text x="290" y="704" text-anchor="middle" dominant-baseline="central" fill="rgb(59,109,17)" font-size="12">private path to S3 · no internet · no NAT needed</text>
  <line x1="290" y1="656" x2="290" y2="670" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5" fill="none"/>
  <line x1="290" y1="716" x2="290" y2="734" marker-end="url(#arrow)" stroke="rgb(115,114,108)" stroke-width="1.5" fill="none"/>

  <!-- S3 -->
  <rect x="52" y="734" width="476" height="44" rx="8" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
  <text x="290" y="750" text-anchor="middle" dominant-baseline="central" fill="rgb(39,80,10)" font-size="14" font-weight="500">S3 bucket</text>
  <text x="290" y="766" text-anchor="middle" dominant-baseline="central" fill="rgb(59,109,17)" font-size="12">outside VPC · stores uploads + EBS snapshots · AWS managed</text>

  <rect x="596" y="734" width="60" height="44" rx="8" fill="rgb(234,243,222)" stroke="rgb(59,109,17)" stroke-width="0.5"/>
  <text x="626" y="750" text-anchor="middle" dominant-baseline="central" fill="rgb(59,109,17)" font-size="12">AWS</text>
  <text x="626" y="766" text-anchor="middle" dominant-baseline="central" fill="rgb(59,109,17)" font-size="12">cloud</text>

  <!-- LEGEND (new entities) -->
  <rect x="20" y="800" width="640" height="200" rx="8" fill="rgb(248,248,248)" stroke="rgb(200,200,200)" stroke-width="0.5"/>
  <text x="40" y="820" dominant-baseline="central" fill="rgb(50,50,50)" font-size="13" font-weight="600">Legend — new entities (2026-06-02)</text>
  <rect x="30" y="832" width="12" height="12" rx="2" fill="rgb(255,245,210)" stroke="rgb(180,130,0)" stroke-width="0.5"/>
  <text x="50" y="838" dominant-baseline="central" fill="rgb(80,80,80)" font-size="12">EBS (Elastic Block Store) — persistent network hard drive attached to EC2. Survives stops. Types: gp3 (default), io2 (high perf), st1 (throughput).</text>
  <rect x="30" y="854" width="12" height="12" rx="2" fill="rgb(255,248,220)" stroke="rgb(180,130,0)" stroke-width="0.5"/>
  <text x="50" y="860" dominant-baseline="central" fill="rgb(80,80,80)" font-size="12">Snapshot — point-in-time backup of an EBS volume stored in S3. Incremental. Use to restore, copy to another region, or build a Golden AMI.</text>
  <rect x="30" y="876" width="12" height="12" rx="2" fill="rgb(255,248,220)" stroke="rgb(180,130,0)" stroke-width="0.5"/>
  <text x="50" y="882" dominant-baseline="central" fill="rgb(80,80,80)" font-size="12">DLM Lifecycle Policy — automates snapshot creation and deletion on a schedule (e.g. daily at 03:00, keep last 7).</text>
  <rect x="30" y="898" width="12" height="12" rx="2" fill="rgb(230,240,255)" stroke="rgb(80,120,200)" stroke-width="0.5"/>
  <text x="50" y="904" dominant-baseline="central" fill="rgb(80,80,80)" font-size="12">Golden AMI — a machine image pre-baked with your app. Launch new instances instantly without running install scripts on every boot.</text>
  <rect x="30" y="920" width="12" height="12" rx="2" fill="rgb(240,240,240)" stroke="rgb(150,150,150)" stroke-width="0.5"/>
  <text x="50" y="926" dominant-baseline="central" fill="rgb(80,80,80)" font-size="12">Instance Store — temp storage on the physical host. Extremely fast but LOST when instance stops. Use only for caches and scratch data.</text>
</svg>
