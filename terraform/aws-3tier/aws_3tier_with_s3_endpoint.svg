  <text x="72" y="216" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Web · 10.0.1.0/24</text>
  <rect x="206" y="204" width="40" height="18" rx="4" fill="rgb(252,235,235)" stroke="rgb(163,45,45)" stroke-width="0.5"/>
